<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESN Porto – GM Minutes Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!--  Page wrapper  -->
    <div class="page">
      <div class="card">

        <!-- Logo -->
        <img id="logo" alt="ESN Porto logo" src="logo.png" />

        <!--  Stepper  -->
        <div id="stepper" aria-label="Progress">
          <div class="step active" id="step-1" data-step="1">
            <div class="step-circle">1</div>
            <span class="step-label">Authenticate</span>
          </div>
          <div class="step-connector"></div>
          <div class="step" id="step-2" data-step="2">
            <div class="step-circle">2</div>
            <span class="step-label">Pick Date</span>
          </div>
          <div class="step-connector"></div>
          <div class="step" id="step-3" data-step="3">
            <div class="step-circle">3</div>
            <span class="step-label">Generate</span>
          </div>
        </div>

        <!--  Step 1: Auth  -->
        <section id="section-auth" class="wizard-section active">
          <h2 class="section-title">Sign in to get started</h2>
          <p class="section-desc">
            Use your ESN Porto Google account to access the GM Agendas spreadsheet. If you don't have one yet, please contact the Main Chair or the IT Manager.
          </p>
          <div class="button-row">
            <button id="auth_button" class="btn btn-primary" disabled>
              <span class="btn-label">Login with Google</span>
            </button>
          </div>
        </section>

        <!--  Step 2 + 3: Action  -->
        <section id="section-action" class="wizard-section">
          <p class="section-desc">
            Source:
            <a href="https://docs.google.com/spreadsheets/d/1-FDcnqWohD_0nPwZueZJcULdGTql5RY90bZjoYo7aow/edit" target="_blank">
              Open GM Agendas Sheet ↗
            </a>
          </p>

          <div class="form-group">
            <label for="gm_day" class="form-label">GM Date</label>
            <select id="gm_day" class="form-input">
              <option value="" disabled selected>Select a GM date...</option>
            </select>
          </div>

          <div class="button-row">
            <button id="generate_button" class="btn btn-primary" disabled>
              <span class="btn-label">Generate Minutes</span>
            </button>
            <button id="redirect_button" class="btn btn-navy" disabled>
              <span class="btn-label">View Result ↗</span>
            </button>
          </div>

        </section>



      </div><!-- /.card -->
    </div><!-- /.page -->

    <!--  Toast container  -->
    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="ui.js"></script>
    <script src="api_setup.js"></script>
    <script src="fetch.js"></script>
    <script src="copy.js"></script>
    <script src="insert.js"></script>
    <script async src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
  </body>
</html>
